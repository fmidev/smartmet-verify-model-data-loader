name: Publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: quay.io/fmi/smartmet-verify-model-data-loader
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Read Python version
        id: read-python
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VERSION=${{ steps.read-python.outputs.version }}
